; Production overrides — loaded after 99-custom.ini
; After deploying new code, restart PHP to clear the cache:
;   docker compose restart php

; OPcache — critical for production PHP performance.
; Eliminates PHP file parsing/compilation on every request.
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.enable_file_override=1

; Realpath cache — reduces filesystem stat() calls for require/include paths.
; Laravel's deep vendor directory benefits significantly from a larger cache.
realpath_cache_size=4096K
realpath_cache_ttl=600
