; Healthcheck endpoint
ping.path = /ping
ping.response = pong

; Process manager — dynamic scales workers based on demand.
; "static" wastes memory when idle; "ondemand" has fork latency.
pm = dynamic

; max_children = container memory limit / avg worker memory
; With 256MB limit and ~30MB per worker: floor(256/30) = 8
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Recycle workers after 500 requests to prevent memory leaks.
pm.max_requests = 500

; Kill workers stuck longer than 30s — prevents thread starvation.
request_terminate_timeout = 30s

; Log requests slower than 5s for performance debugging.
slowlog = /var/log/php/slow.log
request_slowlog_timeout = 5s

; Status page for monitoring (accessible via FastCGI only, not public).
pm.status_path = /status
